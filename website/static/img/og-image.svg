<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f7a3a"/>
      <stop offset="60%" stop-color="#1a4d24"/>
      <stop offset="100%" stop-color="#14361a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e6c97a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#e6c97a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="950" cy="180" r="320" fill="url(#glow)"/>
  <!-- Logo mark -->
  <g transform="translate(90,150)">
    <rect width="180" height="180" rx="36" fill="#205627" stroke="#3a9148" stroke-width="2"/>
    <g transform="translate(90,90)" fill="none" stroke="#e6c97a" stroke-width="9" stroke-linecap="round">
      <path d="M0 -55 L0 65"/>
      <path d="M0 -30 C -28 -25 -42 -8 -42 12"/>
      <path d="M0 -30 C 28 -25 42 -8 42 12"/>
      <path d="M0 -5 C -25 0 -36 18 -36 38"/>
      <path d="M0 -5 C 25 0 36 18 36 38"/>
    </g>
    <circle cx="180" cy="0" r="0" fill="#e6c97a"/>
  </g>
  <!-- Text -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#ffffff">
    <text x="320" y="240" font-size="92" font-weight="800" letter-spacing="-2">AgriRomagna</text>
    <text x="320" y="300" font-size="32" font-weight="500" fill="#e6c97a">Farm Cooperative Management Platform</text>
    <text x="320" y="380" font-size="28" font-weight="400" fill="rgba(255,255,255,0.85)">
      <tspan x="320" dy="0">Plan, track, sell, and protect your harvest —</tspan>
      <tspan x="320" dy="38">one open-source platform for Italian co-ops.</tspan>
    </text>
  </g>
  <!-- Footer chip row -->
  <g transform="translate(320,510)" font-family="-apple-system, sans-serif" font-size="22" fill="#ffffff">
    <rect x="0" y="0" width="200" height="46" rx="23" fill="rgba(255,255,255,0.10)" stroke="rgba(230,201,122,0.45)"/>
    <text x="100" y="30" text-anchor="middle">Next.js 16 · TS · Prisma</text>
    <rect x="220" y="0" width="180" height="46" rx="23" fill="rgba(255,255,255,0.10)" stroke="rgba(230,201,122,0.45)"/>
    <text x="310" y="30" text-anchor="middle">36 data models</text>
    <rect x="420" y="0" width="220" height="46" rx="23" fill="rgba(255,255,255,0.10)" stroke="rgba(230,201,122,0.45)"/>
    <text x="530" y="30" text-anchor="middle">EU compliance ready</text>
  </g>
</svg>
